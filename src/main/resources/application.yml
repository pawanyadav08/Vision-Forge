spring:
  application:
    name: visionforge-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/visionforge_db
    username: visionforge_user
    password: visionforge_secret_2026
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: VisionForgeHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

application:
  security:
    jwt:
      secret-key: "visionforge-ai-super-secret-jwt-key-that-is-very-long-2026"
      expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs
  show-actuator: false

logging:
  level:
    com.visionforge: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%clr(%d{HH:mm:ss}){faint} %clr(%-5level){highlight} %clr(%-40.40logger{39}){cyan} : %msg%n"

# ── Hugging Face Inference API Configuration ──────────────────────────────────
# SECURITY: The API key is NEVER hardcoded here.
# Set the HF_API_KEY environment variable before starting the application:
#   Windows PowerShell : $env:HF_API_KEY = "hf_your_token_here"
#   Linux / macOS      : export HF_API_KEY=hf_your_token_here
#   IntelliJ           : Run → Edit Configurations → Environment Variables
#
# Model options (free tier):
#   - stabilityai/stable-diffusion-xl-base-1.0  (high quality, ~20-40s)
#   - runwayml/stable-diffusion-v1-5             (faster, good quality)
#   - CompVis/stable-diffusion-v1-4              (lightweight)
# ──────────────────────────────────────────────────────────────────────────────
huggingface:
  api-key: ${HF_API_KEY}
  base-url: https://api-inference.huggingface.co
  model: black-forest-labs/FLUX.1-schnell
  timeout-seconds: 120
